name: Release

# 推送 v* 形如 v0.1.0 的 tag 时自动触发，构建 mac/win/linux 三平台安装包并发布到 GitHub Release 附件。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS / Linux 构建暂时关闭，仅保留 Windows 验证整条 release 流程。
          # 恢复时取消下方注释即可（macos-arm64 用 macos-14，x64 用 macos-13）。
          # - name: macos-arm64
          #   os: macos-14
          #   dist_cmd: dist:mac
          # windows-2022 而非 windows-latest：后者自 2026-06-08 起默认 VS 2026
          # (MSBuild 18)，node-gyp/better-sqlite3 暂无法识别，会回退源码编译失败。
          - name: windows-x64
            os: windows-2022
            dist_cmd: dist:win
          # - name: linux-x64
          #   os: ubuntu-latest
          #   dist_cmd: dist:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 固定 Python 3.11：@electron/rebuild@3.6.1 自带的 node-gyp@9.4.1
      # 依赖 distutils，而 distutils 在 Python 3.12+ 已移除（runner 默认 3.14），
      # 否则 better-sqlite3 的 Electron 原生编译会报 ModuleNotFoundError: distutils。
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm ${{ matrix.dist_cmd }}
        env:
          # GitHub Actions 默认即 CI 环境，electron-builder 据此跳过自动发布
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          # 只上传可分发的安装包 + 自动更新元数据，排除 win-unpacked/、
          # 构建日志、sqlite3.h 等 native 编译中间产物，避免污染 GitHub Release。
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/**

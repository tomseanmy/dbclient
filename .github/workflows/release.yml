name: Release

# 推送 v* 形如 v0.1.0 的 tag 时自动触发，构建 mac/win/linux 三平台安装包并发布到 GitHub Release 附件。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # 三平台构建：macOS(arm64)、Windows(x64)、Linux(x64)。
          # 如需 macOS x64，补一条 macos-13 + dist:mac 的 matrix 即可。
          - name: macos-arm64
            os: macos-14
            dist_cmd: dist:mac
          # windows-2022 而非 windows-latest：后者自 2026-06-08 起默认 VS 2026
          # (MSBuild 18)，node-gyp/better-sqlite3 暂无法识别，会回退源码编译失败。
          - name: windows-x64
            os: windows-2022
            dist_cmd: dist:win
          - name: linux-x64
            os: ubuntu-latest
            dist_cmd: dist:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 固定 Python 3.11：@electron/rebuild@3.6.1 自带的 node-gyp@9.4.1
      # 依赖 distutils，而 distutils 在 Python 3.12+ 已移除（runner 默认 3.14），
      # 否则 better-sqlite3 的 Electron 原生编译会报 ModuleNotFoundError: distutils。
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm ${{ matrix.dist_cmd }}
        env:
          # GitHub Actions 默认即 CI 环境，electron-builder 据此跳过自动发布
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.name }}
          # 只上传可分发的安装包 + 自动更新元数据，排除 win-unpacked/、
          # 构建日志、sqlite3.h 等 native 编译中间产物，避免污染 GitHub Release。
          # 注意：这些 glob 只匹配 release/ 顶层（非递归），win-unpacked/ 整目录被排除。
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # fail_on_unmatched_files 按 glob 逐条判断：当前只开 Windows，
          # .msi/.dmg/*.deb 等 glob 必然空匹配会整步失败，故关闭。
          # 放开为 false 后空 glob 被静默跳过，有产物的正常上传。
          fail_on_unmatched_files: false
          # 显式、非递归的扩展名清单：只上传真正的安装包 + latest*.yml，
          # 绝不把 win-unpacked/、node_modules/、构建中间产物放上去。
          files: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/latest*.yml
